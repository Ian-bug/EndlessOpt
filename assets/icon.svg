<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Modern tech gradient - Deep blue to vibrant purple -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>

    <!-- Glassmorphism overlay -->
    <linearGradient id="glassOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.1" />
    </linearGradient>

    <!-- Glow effect -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0" />
    </radialGradient>

    <!-- Speed line gradient -->
    <linearGradient id="speedLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>

    <!-- Gear gradient -->
    <linearGradient id="gearGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Main background with rounded corners -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bgGradient)"/>

  <!-- Glassmorphism overlay -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#glassOverlay)"/>

  <!-- Center glow -->
  <circle cx="256" cy="256" r="180" fill="url(#centerGlow)"/>

  <!-- Outer tech ring - dashed -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.3" stroke-dasharray="8 12"/>

  <!-- Middle tech ring - solid with gradient -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#speedLineGrad)" stroke-width="3" opacity="0.6"/>

  <!-- Inner tech ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2"/>

  <!-- Performance arc - left side -->
  <path d="M 116 256 A 140 140 0 0 1 256 116" fill="none" stroke="url(#speedLineGrad)" stroke-width="8" stroke-linecap="round" opacity="0.8"/>

  <!-- Performance arc - right side -->
  <path d="M 256 116 A 140 140 0 0 1 396 256" fill="none" stroke="url(#speedLineGrad)" stroke-width="8" stroke-linecap="round" opacity="0.6"/>

  <!-- Speed boost symbol - lightning bolt -->
  <g transform="translate(256, 256)">
    <!-- Outer glow -->
    <polygon points="0,-45 12,-8 4,-8 20,45 -12,8 -4,8" fill="#22d3ee" opacity="0.3" transform="scale(1.3)"/>

    <!-- Main lightning bolt -->
    <polygon points="0,-45 12,-8 4,-8 20,45 -12,8 -4,8" fill="url(#gearGradient)"/>

    <!-- Inner highlight -->
    <polygon points="0,-45 8,-5 3,-5 15,35 -5,5 -2,5" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- Tech accent lines - top left -->
  <g stroke="#22d3ee" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <line x1="60" y1="80" x2="90" y2="80" />
    <line x1="60" y1="95" x2="75" y2="95" />
  </g>

  <!-- Tech accent lines - top right -->
  <g stroke="#a855f7" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <line x1="422" y1="80" x2="452" y2="80" />
    <line x1="437" y1="95" x2="452" y2="95" />
  </g>

  <!-- Tech accent lines - bottom left -->
  <g stroke="#a855f7" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <line x1="60" y1="417" x2="90" y2="417" />
    <line x1="60" y1="432" x2="75" y2="432" />
  </g>

  <!-- Tech accent lines - bottom right -->
  <g stroke="#22d3ee" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <line x1="422" y1="417" x2="452" y2="417" />
    <line x1="437" y1="432" x2="452" y2="432" />
  </g>

  <!-- Corner accent dots -->
  <circle cx="76" cy="76" r="3" fill="#22d3ee" opacity="0.8"/>
  <circle cx="436" cy="76" r="3" fill="#a855f7" opacity="0.8"/>
  <circle cx="76" cy="436" r="3" fill="#a855f7" opacity="0.8"/>
  <circle cx="436" cy="436" r="3" fill="#22d3ee" opacity="0.8"/>

  <!-- "EO" branding - modern typography -->
  <text x="256" y="380" font-family="Arial Black, Arial, sans-serif" font-size="68" font-weight="900" fill="#ffffff" text-anchor="middle" opacity="0.95" letter-spacing="6">EO</text>

  <!-- Subtitle tagline -->
  <text x="256" y="415" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.85" letter-spacing="6">SYSTEM OPTIMIZER</text>

  <!-- Version indicator -->
  <text x="256" y="445" font-family="Arial, sans-serif" font-size="14" font-weight="normal" fill="#ffffff" text-anchor="middle" opacity="0.7" letter-spacing="2">v1.0.2</text>

  <!-- Performance indicator bar -->
  <g transform="translate(156, 465)">
    <!-- Background bar -->
    <rect x="0" y="0" width="200" height="6" rx="3" fill="#ffffff" opacity="0.2"/>
    <!-- Active bar -->
    <rect x="0" y="0" width="160" height="6" rx="3" fill="url(#speedLineGrad)"/>
    <!-- Indicator dot -->
    <circle cx="160" cy="3" r="4" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
